name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  id-token: write

env:
  RELEASE_NAME: spring-demo
  NAMESPACE: default
  AWS_REGION: us-east-1
  EKS_CLUSTER: spring-demo
  AWS_ROLE_ARN: arn:aws:iam::708325791586:role/github-actions-spring-demo-deploy

jobs:
  deploy:
    # Only deploy after a CI run triggered by a push to main succeeded
    # (CI also runs on pull_request; that must never trigger a deploy).
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: self-hosted
    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout Helm chart
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          sparse-checkout: |
            helm/spring-demo
          sparse-checkout-cone-mode: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Point kubectl/helm at the EKS cluster
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"

      - name: Deploy with Helm
        # --atomic rolls the release back to the last successful revision
        # automatically if the upgrade doesn't become ready in time.
        run: |
          helm upgrade --install "$RELEASE_NAME" ./helm/spring-demo \
            --namespace "$NAMESPACE" --create-namespace \
            --set app.image.tag="$IMAGE_TAG" \
            --atomic --wait --timeout 5m

      - name: Show pod status and logs on failure
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME"
          kubectl logs -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME,app.kubernetes.io/name=$RELEASE_NAME-app" --tail=50 --all-containers || true
