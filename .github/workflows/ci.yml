name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ajitesh70/spring-demo

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit tests
        run: ./mvnw -B test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          build-mode: manual

      - name: Build for analysis
        run: ./mvnw -B -DskipTests clean package

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4

  dependency-license-scan:
    name: Dependency & License Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 0
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload vulnerability SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-dependencies

      - name: Fail on HIGH/CRITICAL dependency vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table
          skip-setup-trivy: true

      - name: License scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: license
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table
          skip-setup-trivy: true

  build:
    name: Build & Scan Image
    needs: [test, secret-scan, sast, dependency-license-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 0
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload image scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Fail on HIGH/CRITICAL image vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table
          skip-setup-trivy: true

      - name: Save image for downstream jobs
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  dast:
    name: DAST (OWASP ZAP)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Run container under test
        run: docker run -d --name spring-demo-dast -p 8080:8080 ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health/readiness; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time" >&2
          docker logs spring-demo-dast
          exit 1

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:8080"
          fail_action: true
          allow_issue_writing: false

      - name: Stop container
        if: always()
        run: docker rm -f spring-demo-dast || true

  push:
    name: Push Image to Docker Hub
    needs: [build, dast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Tag latest
        run: docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push images
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
