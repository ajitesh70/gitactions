apiVersion: v1
kind: Service
metadata:
  name: {{ include "spring-demo.fullname" . }}-app
  labels:
    {{- include "spring-demo.labels" . | nindent 4 }}
    {{- include "spring-demo.app.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "spring-demo.app.selectorLabels" . | nindent 4 }}
